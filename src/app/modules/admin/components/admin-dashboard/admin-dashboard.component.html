<div style="background-color: #F8F8F8; min-height: 91vh;">

    <div style="padding-top: 10px;"></div>
    <nz-spin [nzSpinning]="isSpinning" [nzSize]="'large'" nzTip="Working...">
        <div style="padding-bottom: 30px; margin-top: 10px;" class="child" *ngFor="let car of cars">
            <div nz-row>
                <div nz-col nzSpan="8">
                    <img class="profile" style="height: 130px; width: 200px; border-radius: 10px;"
                        [src]="car.processedImg" alt="profile" />
                    <img *ngIf="car.mapImageUrl" [src]="car.mapImageUrl" alt="Car location" width="400" height="200"
                        style="margin-left: 100px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.3)">
                </div>
                <div nz-col nzSpan="16">
                    <h2 style="cursor: pointer; color: #108ee9;">
                        {{car.brand}} - {{car.name}}</h2>
                    <p>{{car.description}}</p>

                    <hr>
                    <h5>Price : <b>${{car.price}}</b> - Color : <b>{{car.color}}</b> - Transmission :
                        <b>{{car.transmission}}</b> - Type : <b>{{car.type}}</b> - Year : <b>{{car.year}}</b>
                    </h5>
                    <hr>
                    <div style="float: right;">
                        <button style="margin-left: 10px;" nzSize="small" nz-button nzType="primary"
                            routerLink="/admin/car/{{car.id}}">Update</button>
                        <button style="margin-left: 10px;" nzSize="small" nz-button nzType="primary"
                            (click)="deleteCar(car.id)" nzDanger>Delete</button>
                    </div>
                </div>

            </div>

        </div>
    </nz-spin>
</div>
